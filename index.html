<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Hacks Daily</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #007bff; }
        .video-feed { display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 20px; }
        .video-card { background: #161616; border-radius: 12px; padding: 15px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .video-card h3 { color: #fff; margin-top: 0; margin-bottom: 15px; }
        .yt-container { position: relative; width: 100%; aspect-ratio: 9 / 16; background: #000; border-radius: 8px; overflow: hidden; }
        .yt-container iframe { position: absolute; width: 100%; height: 100%; border: none; }
        .text-content { color: #ccc; line-height: 1.5; font-size: 16px; }
        .fb-btn { display: block; width: 100%; text-align: center; background: #007bff; color: white; padding: 12px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <h1>Mind Hacks Daily</h1>
    <div class="video-feed" id="videoFeed">Loading content...</div>

    <script>
        // REPLACE WITH YOUR KEYS
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "mind-hacks-daily.firebaseapp.com",
            projectId: "mind-hacks-daily",
            storageBucket: "mind-hacks-daily.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Helper: Convert YouTube links to embed format
        function getEmbedUrl(url) {
            if (url.includes('shorts/')) return url.replace('shorts/', 'embed/');
            if (url.includes('watch?v=')) return url.replace('watch?v=', 'embed/');
            if (url.includes('youtu.be/')) return url.replace('youtu.be/', 'youtube.com/embed/');
            return url;
        }

        db.collection('videos').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = '';
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'video-card';
                
                if (data.type === 'video') {
                    // Check if Facebook
                    const isFB = data.url.includes('facebook.com') || data.url.includes('fb.watch');
                    
                    card.innerHTML = `<h3>${data.title}</h3>
                        ${isFB ? 
                        `<a href="${data.url}" target="_blank" class="fb-btn">Watch on Facebook</a>` : 
                        `<div class="yt-container"><iframe src="${getEmbedUrl(data.url)}" allowfullscreen></iframe></div>`}`;
                
                } else {
                    // Text or Blog post
                    card.innerHTML = `<h3>${data.title}</h3><p class="text-content">${data.content}</p>`;
                }
                feed.appendChild(card);
            });
        });
    </script>
</body>
</html>
