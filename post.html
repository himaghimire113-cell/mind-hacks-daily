<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post</title>
    <link rel="stylesheet" href="css/style.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'GA_MEASUREMENT_ID');
    </script>
</head>
<body>
    <button class="hamburger" id="hamburgerBtn" aria-label="Open navigation menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
    
    <nav class="nav-overlay" id="navOverlay" aria-hidden="true">
        <div class="nav-content">
            <button class="nav-close" id="navClose" aria-label="Close menu">&times;</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#featured">Featured Posts</a></li>
                <li><a href="index.html#latest">Latest Posts</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="admin.html">Admin Login</a></li>
            </ul>
        </div>
    </nav>
    
    <article class="post-full" id="postContainer">
        <div class="container">
            <div id="postContent">
                <p class="loading">Loading article...</p>
            </div>
            
            <!-- Engagement -->
            <div class="post-actions">
                <button class="like-btn" id="likeBtn" aria-label="Like this post">
                    <span class="like-icon">&hearts;</span>
                    <span id="likeCount">0</span> Likes
                </button>
                <div class="share-buttons">
                    <button onclick="sharePost('facebook')">Share on Facebook</button>
                    <button onclick="sharePost('twitter')">Share on X</button>
                    <button onclick="sharePost('email')">Email</button>
                </div>
            </div>
            
            <!-- Reviews -->
            <section class="reviews-section">
                <h3>Reader Reviews</h3>
                <div id="reviewsList">
                    <p class="loading">Loading reviews...</p>
                </div>
                <form id="reviewForm" class="review-form">
                    <h4>Write a Review</h4>
                    <div class="form-group">
                        <label for="reviewerName">Your Name</label>
                        <input type="text" id="reviewerName" required>
                    </div>
                    <div class="form-group">
                        <label for="reviewRating">Rating</label>
                        <select id="reviewRating">
                            <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733; Excellent</option>
                            <option value="4">&#9733;&#9733;&#9733;&#9733; Good</option>
                            <option value="3">&#9733;&#9733;&#9733; Average</option>
                            <option value="2">&#9733;&#9733; Poor</option>
                            <option value="1">&#9733; Very Poor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reviewText">Your Review</label>
                        <textarea id="reviewText" rows="4" required></textarea>
                    </div>
                    <button type="submit">Submit Review</button>
                </form>
            </section>
            
            <!-- Comments -->
            <section class="comments-section">
                <h3>Comments</h3>
                <div id="commentsList">
                    <p class="loading">Loading comments...</p>
                </div>
                <form id="commentForm" class="comment-form">
                    <h4>Leave a Comment</h4>
                    <div class="form-group">
                        <label for="commenterName">Your Name</label>
                        <input type="text" id="commenterName" required>
                    </div>
                    <div class="form-group">
                        <label for="commentText">Comment</label>
                        <textarea id="commentText" rows="4" required></textarea>
                    </div>
                    <button type="submit">Post Comment</button>
                </form>
            </section>
        </div>
    </article>
    
    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Finance & Health Blog. All rights reserved.</p>
        </div>
    </footer>
    
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/post.js"></script>
</body>
</html>
