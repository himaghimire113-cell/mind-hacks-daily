<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Mind Hacks Daily</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #bbb; }
        input[type="text"], textarea, select { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; }
        .delete-btn { background: #dc3545; padding: 8px 12px; font-size: 14px; width: auto; }
        .post-item { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h2 { border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <h2>Publish Content</h2>
    <div class="form-group">
        <label>Post Type</label>
        <select id="postType" onchange="toggleFields()">
            <option value="video">Video</option>
            <option value="text">Short Text</option>
            <option value="blog">Blog Post</option>
        </select>
    </div>
    <div class="form-group"><label>Title</label><input type="text" id="videoTitle"></div>
    <div class="form-group" id="urlGroup"><label>URL</label><input type="text" id="videoUrl"></div>
    <div class="form-group" id="contentGroup" style="display:none;"><label>Content</label><textarea id="postContent" rows="3"></textarea></div>
    <button id="submitBtn">Publish Post</button>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #444;">

    <h2>Manage Posts</h2>
    <div id="postList">Loading...</div>

    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "mind-hacks-daily.firebaseapp.com",
            projectId: "mind-hacks-daily",
            storageBucket: "mind-hacks-daily.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. Toggle Inputs
        function toggleFields() {
            const type = document.getElementById('postType').value;
            document.getElementById('urlGroup').style.display = (type === 'video') ? 'block' : 'none';
            document.getElementById('contentGroup').style.display = (type !== 'video') ? 'block' : 'none';
        }

        // 2. Publish Logic
        document.getElementById('submitBtn').addEventListener('click', async () => {
            await db.collection('videos').add({
                type: document.getElementById('postType').value,
                title: document.getElementById('videoTitle').value,
                url: document.getElementById('videoUrl').value,
                content: document.getElementById('postContent').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert('Posted!');
        });

        // 3. Manage/Delete Logic
        db.collection('videos').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
            const list = document.getElementById('postList');
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'post-item';
                item.innerHTML = `
                    <span>${doc.data().title}</span>
                    <button class="delete-btn" onclick="deletePost('${doc.id}')">Delete</button>
                `;
                list.appendChild(item);
            });
        });

        async function deletePost(id) {
            if(confirm('Are you sure you want to delete this post?')) {
                await db.collection('videos').doc(id).delete();
            }
        }
    </script>
</body>
</html>
